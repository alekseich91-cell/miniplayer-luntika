name: Build Windows

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller main.py --name=MusicPlayer --onedir --windowed --noconfirm --clean --hidden-import=pygame --hidden-import=PyQt6

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicPlayer-Windows
          path: dist/MusicPlayer/
          compression-level: 9
